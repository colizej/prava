{% if show %}
<div id="keys-widget"
     class="flex items-center gap-2 text-sm select-none"
     data-balance="{{ balance }}"
     data-today-minutes="{{ today_minutes }}"
     data-min-minutes="{{ min_minutes }}"
     data-awarded="{{ awarded_today|yesno:'true,false' }}"
     data-award-amount="{{ award_amount }}"
     data-keys-cost="{{ keys_per_pack }}"
     data-questions-reward="{{ questions_per_pack }}"
     data-icon="{{ icon }}"
     data-heartbeat-url="{% url 'rewards:heartbeat' %}"
     data-spend-url="{% url 'rewards:spend' %}">

  {# Balance bubble #}
  <span id="keys-balance"
        class="inline-flex items-center gap-1 font-semibold text-amber-600 dark:text-amber-400">
    <span id="keys-icon">{{ icon }}</span><span id="keys-count">{{ balance }}</span>
  </span>

  {# Progress / countdown (hidden once awarded today) #}
  <span id="keys-progress" class="flex items-center gap-1 text-xs">
    {% if not awarded_today %}
      <span id="keys-dots" class="text-gray-400 tracking-tight"></span>
      <span id="keys-label" class="text-gray-400 whitespace-nowrap hidden sm:inline"></span>
    {% else %}
      <span class="text-green-500">✓</span>
    {% endif %}
  </span>

  {# Spend button (visible only when balance >= cost) #}
  {% if balance >= keys_per_pack %}
  <button id="keys-spend-btn"
          title="Échanger {{ keys_per_pack }} {{ icon }} contre {{ questions_per_pack }} questions"
          class="text-xs px-1.5 py-0.5 rounded border border-amber-400 text-amber-600
                 hover:bg-amber-50 dark:hover:bg-amber-900/30 transition">
    +{{ questions_per_pack }}q
  </button>
  {% else %}
  <button id="keys-spend-btn" style="display:none"
          class="text-xs px-1.5 py-0.5 rounded border border-amber-400 text-amber-600
                 hover:bg-amber-50 dark:hover:bg-amber-900/30 transition">
    +{{ questions_per_pack }}q
  </button>
  {% endif %}
</div>

<script>
(function () {
  'use strict';

  const widget      = document.getElementById('keys-widget');
  if (!widget) return;

  // ── State from server ────────────────────────────────────────────────────
  let balance        = parseInt(widget.dataset.balance, 10);
  let todayMinutes   = parseInt(widget.dataset.todayMinutes, 10);
  const minMinutes   = parseInt(widget.dataset.minMinutes, 10);
  let awardedToday   = widget.dataset.awarded === 'true';
  const awardAmount  = parseInt(widget.dataset.awardAmount, 10);
  const keysCost     = parseInt(widget.dataset.keysCost, 10);
  const qReward      = parseInt(widget.dataset.questionsReward, 10);
  const icon         = widget.dataset.icon;
  const heartbeatUrl = widget.dataset.heartbeatUrl;
  const spendUrl     = widget.dataset.spendUrl;

  // ── DOM refs ─────────────────────────────────────────────────────────────
  const countEl    = document.getElementById('keys-count');
  const dotsEl     = document.getElementById('keys-dots');
  const labelEl    = document.getElementById('keys-label');
  const progressEl = document.getElementById('keys-progress');
  const spendBtn   = document.getElementById('keys-spend-btn');

  // ── CSRF helper ──────────────────────────────────────────────────────────
  function getCsrf() {
    const m = document.cookie.match(/csrftoken=([^;]+)/);
    return m ? m[1] : '';
  }

  // ── Render helpers ───────────────────────────────────────────────────────
  function renderDots(filled, total) {
    let s = '';
    for (let i = 0; i < total; i++) s += (i < filled ? '●' : '○');
    return s;
  }

  function updateUI() {
    countEl.textContent = balance;

    // Show / hide spend button
    if (spendBtn) {
      spendBtn.style.display = (balance >= keysCost) ? '' : 'none';
    }

    if (!progressEl) return;

    if (awardedToday) {
      progressEl.innerHTML =
        `<span class="text-green-500 font-medium">✓ +${awardAmount} aujourd'hui</span>`;
      return;
    }

    // Dots: fill up to todayMinutes, total = minMinutes
    const filled = Math.min(todayMinutes, minMinutes);
    const remaining = Math.max(0, minMinutes - todayMinutes);

    if (dotsEl) dotsEl.textContent = renderDots(filled, minMinutes);
    if (labelEl) {
      labelEl.textContent = remaining > 0
        ? `+${awardAmount} dans ${remaining} min`
        : `attribution en cours…`;
    }
  }

  // ── Heartbeat (every 60 s) ───────────────────────────────────────────────
  function sendHeartbeat() {
    fetch(heartbeatUrl, {
      method: 'POST',
      headers: {
        'X-CSRFToken': getCsrf(),
        'X-Requested-With': 'XMLHttpRequest',
      },
      credentials: 'same-origin',
    })
    .then(r => r.ok ? r.json() : null)
    .then(data => {
      if (!data) return;
      balance      = data.balance;
      todayMinutes = data.today_minutes;
      awardedToday = data.awarded_today;

      if (data.awarded_now) {
        // Brief flash on the balance
        countEl.classList.add('text-yellow-400');
        setTimeout(() => countEl.classList.remove('text-yellow-400'), 1500);
      }
      updateUI();
    })
    .catch(() => { /* silent — no network error shown to user */ });
  }

  // ── Spend keys ───────────────────────────────────────────────────────────
  if (spendBtn) {
    spendBtn.addEventListener('click', function () {
      spendBtn.disabled = true;
      fetch(spendUrl, {
        method: 'POST',
        headers: {
          'X-CSRFToken': getCsrf(),
          'X-Requested-With': 'XMLHttpRequest',
        },
        credentials: 'same-origin',
      })
      .then(r => r.json())
      .then(data => {
        if (data.ok) {
          balance = data.balance;
          updateUI();
          // Tiny confirmation flash
          const flash = document.createElement('span');
          flash.textContent = `+${qReward} questions !`;
          flash.className = 'text-xs text-green-600 font-medium ml-1';
          progressEl.appendChild(flash);
          setTimeout(() => flash.remove(), 3000);
        } else {
          spendBtn.disabled = false;
        }
      })
      .catch(() => { spendBtn.disabled = false; });
    });
  }

  // ── Init ─────────────────────────────────────────────────────────────────
  updateUI();
  setInterval(sendHeartbeat, 60000);   // every 60 seconds
  sendHeartbeat();                     // also fire once right away (handles page load)
})();
</script>
{% endif %}
