{% if show %}
<div id="keys-widget"
     data-balance="{{ balance }}"
     data-today-minutes="{{ today_minutes }}"
     data-min-minutes="{{ min_minutes }}"
     data-awarded="{{ awarded_today|yesno:'true,false' }}"
     data-award-amount="{{ award_amount }}"
     data-keys-cost="{{ keys_per_pack }}"
     data-questions-reward="{{ questions_per_pack }}"
     data-icon="{{ icon }}"
     data-heartbeat-url="{% url 'rewards:heartbeat' %}"
     data-spend-url="{% url 'rewards:spend' %}"
     class="flex items-center gap-2 select-none">

  <a href="{% url 'accounts:profile' %}"
     class="relative flex-shrink-0 flex items-center gap-2 group no-underline">

    {% if avatar_url %}
      <img src="{{ avatar_url }}"
           class="w-8 h-8 rounded-full object-cover ring-2 ring-transparent group-hover:ring-blue-400 transition"
           alt="">
    {% else %}
      <div class="w-8 h-8 rounded-full bg-blue-600 group-hover:bg-blue-700 transition
                  flex items-center justify-center text-white text-xs font-bold leading-none">
        {{ initial }}
      </div>
    {% endif %}

    <span id="keys-badge"
          class="flex items-center gap-0.5 text-sm font-semibold text-amber-600
                 group-hover:text-amber-700 transition">
      {{ icon }}<span id="keys-count">{{ balance }}</span>
    </span>

  </a>

  {% if not awarded_today %}
  <div id="keys-progress-row"
       title="+{{ award_amount }} {{ icon }} après {{ min_minutes }} min d'activité"
       class="flex items-center gap-px transition-opacity duration-500">
    <span id="keys-dots" class="tracking-tighter text-xs text-gray-300"></span>
  </div>
  {% endif %}

</div>

<script>
(function () {
  'use strict';
  const widget = document.getElementById('keys-widget');
  if (!widget) return;

  let balance       = parseInt(widget.dataset.balance, 10);
  let todayMinutes  = parseInt(widget.dataset.todayMinutes, 10);
  const minMinutes  = parseInt(widget.dataset.minMinutes, 10);
  let awardedToday  = widget.dataset.awarded === 'true';
  const heartbeatUrl = widget.dataset.heartbeatUrl;

  const countEl    = document.getElementById('keys-count');
  const dotsEl     = document.getElementById('keys-dots');
  const progressRow = document.getElementById('keys-progress-row');

  function getCsrf() {
    const m = document.cookie.match(/csrftoken=([^;]+)/);
    return m ? m[1] : '';
  }

  function renderDots() {
    if (!dotsEl) return;
    const filled = Math.min(todayMinutes, minMinutes);
    let s = '';
    for (let i = 0; i < minMinutes; i++) s += i < filled ? '●' : '○';
    dotsEl.textContent = s;
  }

  function hideProgress() {
    if (!progressRow) return;
    progressRow.style.opacity = '0';
    setTimeout(() => progressRow.remove(), 500);
  }

  function updateUI() {
    if (countEl) countEl.textContent = balance;
    if (awardedToday) {
      hideProgress();
    } else {
      renderDots();
    }
  }

  function sendHeartbeat() {
    fetch(heartbeatUrl, {
      method: 'POST',
      headers: { 'X-CSRFToken': getCsrf(), 'X-Requested-With': 'XMLHttpRequest' },
      credentials: 'same-origin',
    })
    .then(r => r.ok ? r.json() : null)
    .then(data => {
      if (!data) return;
      balance      = data.balance;
      todayMinutes = data.today_minutes;
      awardedToday = data.awarded_today;
      if (data.awarded_now) {
        const badge = document.getElementById('keys-badge');
        if (badge) {
          badge.classList.add('scale-125');
          setTimeout(() => badge.classList.remove('scale-125'), 600);
        }
      }
      updateUI();
    })
    .catch(() => {});
  }

  updateUI();
  setInterval(sendHeartbeat, 60000);
  sendHeartbeat();
})();
</script>
{% endif %}
