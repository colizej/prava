{% if show %}
{% load i18n %}
{# Simple fuel balance row for mobile nav menu — no JS, no duplicate IDs #}
<a href="{% url 'main:home' %}#fuel-feature"
   class="flex items-center justify-between py-2 text-gray-700 hover:text-blue-600 group">
  <span class="flex items-center gap-2">
    <span>{{ icon }}</span>
    <span>{% trans "Réservoir" %}</span>
  </span>
  <span class="flex items-center gap-1.5">
    <span class="text-sm font-bold text-amber-600">{{ balance }} <span class="text-xs font-normal text-gray-400">/ {{ tank_capacity }} L</span></span>
    {# Mini fill bar #}
    <span style="display:inline-block;width:36px;height:8px;border-radius:99px;background:#f3f4f6;overflow:hidden;vertical-align:middle">
      <span style="display:block;height:100%;border-radius:99px;width:{{ balance_pct }}%;background:{% if balance == 0 %}#ef4444{% elif balance <= 10 %}#f59e0b{% elif balance <= 25 %}#fb923c{% else %}#22c55e{% endif %}"></span>
    </span>
  </span>
</a>
{% endif %}
