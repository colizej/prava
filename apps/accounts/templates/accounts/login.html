{% extends "base.html" %}
{% block title %}Connexion — {{ SITE_NAME }}{% endblock %}
{% block content %}
<div class="max-w-md mx-auto px-4 py-16">
    <h1 class="text-2xl font-bold text-gray-900 mb-6 text-center">Connexion</h1>
    <form method="post" class="bg-white p-8 rounded-xl shadow-sm border border-gray-100">
        {% csrf_token %}
        <div class="mb-4">
            <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Nom d'utilisateur</label>
            <input type="text" name="username" id="username" required autofocus
                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
        </div>
        <div class="mb-6">
            <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Mot de passe</label>
            <input type="password" name="password" id="password" required
                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
        </div>
        <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition">
            Se connecter
        </button>
    </form>
    <p class="text-center mt-6 text-sm text-gray-600">
        Pas encore de compte ?
        <a href="{% url 'accounts:register' %}" class="text-blue-600 hover:text-blue-700 font-medium">S'inscrire</a>
    </p>
</div>
{% endblock %}
