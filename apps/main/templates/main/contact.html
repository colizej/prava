{% extends "base.html" %}
{% load i18n %}
{% block title %}{% trans "Contact" %} — {{ SITE_NAME }}{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto px-4 py-16">
    <h1 class="text-3xl font-bold text-gray-900 mb-8">{% trans "Contactez-nous" %}</h1>
    <form method="post" class="space-y-6">
        {% csrf_token %}
        {# Honeypot anti-spam: hidden from humans, visible to bots #}
        <div style="position:absolute;left:-9999px;top:-9999px;height:0;overflow:hidden" aria-hidden="true">
            <label for="id_hp">Website</label>
            <input type="text" name="hp" id="id_hp" tabindex="-1" autocomplete="nope" value="">
        </div>
        <div>
            <label for="name" class="block text-sm font-medium text-gray-700 mb-1">{% trans "Nom" %}</label>
            <input type="text" name="name" id="name" required
                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
        </div>
        <div>
            <label for="email" class="block text-sm font-medium text-gray-700 mb-1">{% trans "Email" %}</label>
            <input type="email" name="email" id="email" required
                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
        </div>
        <div>
            <label for="subject" class="block text-sm font-medium text-gray-700 mb-1">{% trans "Sujet" %}</label>
            <input type="text" name="subject" id="subject" required
                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
        </div>
        <div>
            <label for="message" class="block text-sm font-medium text-gray-700 mb-1">{% trans "Message" %}</label>
            <textarea name="message" id="message" rows="5" required
                      class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"></textarea>
        </div>
        <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition">
            {% trans "Envoyer" %}
        </button>
    </form>
</div>
{% endblock %}
