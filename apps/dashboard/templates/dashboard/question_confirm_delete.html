{% extends "dashboard/base.html" %}

{% block dashboard_content %}

<div class="max-w-lg mx-auto mt-12">
  <div class="bg-white rounded-xl border border-red-200 shadow-sm p-8 text-center">
    <div class="w-14 h-14 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
      <svg class="w-7 h-7 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
      </svg>
    </div>
    <h2 class="text-xl font-bold text-gray-800 mb-2">Supprimer Q#{{ question.pk }} ?</h2>
    <p class="text-gray-500 text-sm mb-6">
      « {{ question.text|truncatechars:100 }} »<br>
      <span class="text-red-500 font-medium">Cette action est irréversible.</span>
    </p>
    <form method="post" class="flex gap-3 justify-center">
      {% csrf_token %}
      <button type="submit"
              class="px-6 py-2.5 bg-red-600 text-white text-sm font-semibold rounded-lg hover:bg-red-700">
        Oui, supprimer
      </button>
      <a href="{% url 'dashboard:question_detail' question.pk %}"
         class="px-6 py-2.5 border border-gray-300 text-gray-700 text-sm font-medium rounded-lg hover:bg-gray-50">
        Annuler
      </a>
    </form>
  </div>
</div>

{% endblock %}
