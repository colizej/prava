<script>
$(document).ready(function(){serie_id=65;questions=54;examen=[{"id":"3419","qid":"13","qw":"1","q":"Vous &ecirc;tes m&eacute;dicalement inapte &agrave; la conduite.<br \/>Dans quel d&eacute;lai devez vous informer la commune ?<br \/><br \/>A. le lendemain.<br \/>B. 4 jours.<br \/>C. 7 jours.","s":"b","e":"INFO - PERMIS DE CONDUIRE<br \/>Si vous &ecirc;tes physiquement ou mentalement inapte &agrave; conduire un v&eacute;hicule, vous devez rendre votre permis &agrave; votrecommune dans les 4 jours ouvrables <br \/>Il est du devoir du m&eacute;decin g&eacute;n&eacute;raliste, du sp&eacute;cialiste et du m&eacute;decin du travail d&#039;avertir le patient qu&#039;une affection ayant &eacute;t&eacute; diagnostiqu&eacute;e le rend inapte &agrave; la conduite. Il est ensuite de la responsabilit&eacute; du conducteur de remettre son permis de conduire &agrave; la commune: en effet tout d&eacute;tenteur d&rsquo;un permis doit le pr&eacute;senter &agrave; l&#039;autorit&eacute; qui l&#039;a d&eacute;livr&eacute; pour retrait end&eacute;ans les 4 jours ouvrables suivant le jour o&ugrave; il apprend &ecirc;tre atteint d&rsquo;un des d&eacute;fauts physiques ou affections le rendant inapte &agrave; la conduite d&rsquo;un v&eacute;hicule."},{"id":"3424","qid":"18","qw":"1","q":"Entrez un nombre :<br \/>&Agrave; quelle vitesse maximale pouvez-vous circuler sur une voie publique ordinaire en Flandre ?","s":"70","e":"LE&Ccedil;ON 1 &ndash; &lsquo;La chauss&eacute;e&rsquo;. <br \/>La vitesse maximale sur une route ordinaire est&hellip;<br \/>&hellip; en Wallonne : 90 km\/h;<br \/>&hellip; en Flandre : 70 km\/h."},{"id":"3421","qid":"15","qw":"1","q":"Ce signal routier signifie : voie sans issue ...<br \/><br \/>A. ... pour les pi&eacute;tons et les cyclistes.<br \/>B. ... sauf pour les pi&eacute;tons et les cyclistes.","s":"b","e":"LE&Ccedil;ON 1 &ndash; &lsquo;La voie publique&rsquo;."},{"id":"3411","qid":"5","qw":"1","q":"Le code de la route s&rsquo;applique-t-il dans un chemin priv&eacute; ?","s":"non","e":"LE&Ccedil;ON 1 &ndash; &lsquo;La voie publique&rsquo;.<br \/>Les routes o&ugrave; figure le signe &quot;priv&eacute;&quot;, ne font pas partie de la voie publique. Ici le code de la route ne s&#039;applique pas, SAUF si c&#039;est un chemin priv&eacute; qui peut &ecirc;tre accessible &agrave; tous."},{"id":"20498","qid":"49","qw":"1","q":"&Agrave; partir de quel &acirc;ge peut-on passer l&rsquo;examen pratique du permis de conduire B en Belgique ?<br \/><br \/>A. 17 ans.<br \/>B. 17 ans et 9 mois.<br \/>C. 18 ans.","s":"c","e":"INFO - PERMIS DE CONDUIRE<br \/>D&egrave;s que vous avez 18 ans, vous pouvez pr&eacute;senter l&rsquo;examen pratique du permis de conduire B dans un centre d&rsquo;examen, &agrave; condition que votre p&eacute;riode de stage remplisse les exigences l&eacute;gales."},{"id":"21068","qid":"53","qw":"1","q":"Lors d&rsquo;un contr&ocirc;le de police, tu remarques que tu as oubli&eacute; ton portefeuille avec ton permis de conduire &agrave; la maison. Quelles sont les cons&eacute;quences ?<br \/><br \/>A. Tu ne peux plus continuer &agrave; rouler.<br \/>B. Tu re&ccedil;ois seulement une amende pour une infraction de premier degr&eacute;.<br \/>C. Tu dois pr&eacute;senter ton permis de conduire dans un commissariat dans les 5 jours.","s":"c","e":"INFO -PERMIS DE CONDUIRE<br \/>Le fait de ne pas avoir son permis de conduire sur soi n&rsquo;est pas une infraction grave. Tu recevras une amende administrative limit&eacute;e et tu peux en principe continuer &agrave; circuler.<br \/>Cependant, tu dois pr&eacute;senter ton permis dans un commissariat dans les 5 jours.<br \/>En cas de perte ou de vol, tu ne peux pas conduire tant que tu n&rsquo;as pas re&ccedil;u ton nouveau permis. L&rsquo;attestation de perte ou de vol n&rsquo;est pas suffisante pour conduire."},{"id":"3417","qid":"11","qw":"1","q":"Est-ce que le conducteur de cette voiture a les mains correctement sur le volant ?","s":"oui","e":"LE&Ccedil;ON 1 &ndash; &lsquo;La voie publique&rsquo;.<br \/>Pendant la conduite, placez les deux mains sur le volant, &agrave; la position pr&eacute;vue &agrave; cet effet entre 09 :15 et 10 :10 l&agrave; o&ugrave; vous pouvez facilement atteindre les commandes des clignotants et des essuies glaces."},{"id":"3434","qid":"28","qw":"1","q":"Quel signal routier un conducteur rencontrera-t-il sur cette route ? <br \/><br \/>A. Signal 1.<br \/>B. Signal 2.","s":"a","e":"LE&Ccedil;ON 1 &ndash; &lsquo;La voie publique&rsquo;.<br \/>La signification du premier signal routier : descente dangereuse.<br \/>La signification du deuxi&egrave;me signal routier : mont&eacute;e &agrave; forte inclinaison.<br \/>Presque tous signaux routiers triangulaire avec un bord rouge sont des signaux de danger. <br \/>Les signaux de danger sont plac&eacute;s &agrave; une distance approximative de 150 m de l&#039;endroit dangereux."},{"id":"3429","qid":"23","qw":"1","q":"Que signifie ce signal routier ?<br \/><br \/>A. Travers&eacute;e de b&eacute;tail.<br \/>B. Donner la priorit&eacute; au b&eacute;tail.","s":"a","e":"LE&Ccedil;ON 1 &ndash; &lsquo;La voie publique&rsquo;.<br \/>Signal de danger : Travers&eacute;e de b&eacute;tail<br \/>Les signaux de danger sont plac&eacute;s &agrave; une distance approximative de 150 m de l&#039;endroit dangereux sauf mention contraire sur un panneau bleu plac&eacute; sous le signal."},{"id":"3425","qid":"19","qw":"1","q":"Entrez un nombre : <br \/>&Agrave; quelle vitesse maximale pouvez-vous circuler sur une voie publique ordinaire en Wallonie?","s":"90","e":"LE&Ccedil;ON 1 &ndash; &lsquo;La voie publique&rsquo;.<br \/>La vitesse maximale sur une voie ordinaire est&hellip;<br \/>&hellip; en Flandre et Bruxelles-capitale: 70 km\/h."},{"id":"17902","qid":"37","qw":"1","q":"Quelle est la vitesse maximale autoris&eacute;e sur une chauss&eacute;e &agrave; voie centrale en R&eacute;gion wallonne ?<br \/><br \/>A. 30 km\/h.<br \/>B. 70 km\/h.<br \/>C. 90 km\/h.","s":"b","e":"LE&Ccedil;ON 1 &ndash; &lsquo;La voie publique&rsquo;.<br \/>70 km\/h en Belgique."},{"id":"3420","qid":"14","qw":"1","q":"La partie o&ugrave; vous voyez les lignes jaunes fait-elle partie de la voie publique ?","s":"oui","e":"LE&Ccedil;ON 1 &ndash; &lsquo;La voie publique&rsquo;.<br \/>Les accotements en herbe font partie de la voie publique.<br \/>La voie publique s&rsquo;&eacute;tend jusqu&#039;&agrave; ce que un canal foss&eacute; ou &agrave; une propri&eacute;t&eacute;."},{"id":"3426","qid":"20","qw":"1","q":"Que signifie ce signal d&rsquo;indication ?<br \/><br \/>A. Obligation de tourner &agrave; droite.<br \/>B. Voie sans issue.<br \/>C. Acc&egrave;s interdit.","s":"b","e":"LE&Ccedil;ON 1 &ndash; &lsquo;La voie publique&rsquo;.<br \/>La signification de ce signal routier : voie sans issue (pour tout usager).<br \/>C&#039;est un signal d&#039;indication."},{"id":"3439","qid":"33","qw":"1","q":"Vous avez le permis de conduire provisoire B. <br \/>Pouvez-vous conduire une voiture dimanche soir apr&egrave;s 22h ?","s":"non","e":"INFO - PERMIS DE CONDUIRE<br \/>Vous ne pouvez pas conduire avec un permis provisoire sur la voie publique:<br \/>. Du vendredi soir 22h00 &agrave; samedi matin 6h00;<br \/>. Du samedi soir 22h00 &agrave; dimanche matin 6h00;<br \/>. Du dimanche soir 22h00 &agrave; lundi matin 6h00;<br \/>. Le soir avant un jour f&eacute;ri&eacute; 22h00 au matin de ce jour f&eacute;ri&eacute; 6h00;<br \/>. Le soir du jour f&eacute;ri&eacute; 22h00 au matin du lendemain 6h00.<br \/>Nous sommes un dimanche et la conduite n&rsquo;est pas autoris&eacute;e avant 6h lundi matin."},{"id":"20499","qid":"50","qw":"1","q":"Qu&rsquo;est-ce qu&rsquo;une station-service ?<br \/><br \/>A. Une voie publique.<br \/>B. Un terrain public.<br \/>C. Un terrain priv&eacute;.","s":"b","e":"LE&Ccedil;ON 1<br \/>Un terrain public, comme le parking d&rsquo;un restaurant ou une station-service, est un lieu public o&ugrave; l&rsquo;on ne circule qu&rsquo;en cas de n&eacute;cessit&eacute;, c&rsquo;est-&agrave;-dire uniquement si l&rsquo;on doit vraiment s&rsquo;y rendre."},{"id":"20496","qid":"47","qw":"1","q":"Quel &acirc;ge faut-il avoir pour pouvoir pr&eacute;senter l&rsquo;examen th&eacute;orique du permis B ?<br \/><br \/>A. 17 ans.<br \/>B. 17 ans et 9 mois.<br \/>C. 18 ans.","s":"a","e":"INFO : PERMIS DE CONDUIRE<br \/>D&egrave;s que tu as 17 ans, tu peux passer l&rsquo;examen th&eacute;orique dans un centre d&rsquo;examen. Pour r&eacute;ussir, il faut obtenir au moins 41 points sur 50."},{"id":"19447","qid":"38","qw":"1","q":"Quelle est la dur&eacute;e de validit&eacute; d&rsquo;un permis de conduire belge au format carte bancaire ?<br \/><br \/>A. 1 an.<br \/>B. 5 ans.<br \/>C. 10 ans.","s":"c","e":"INFO - PERMIS DE CONDUIRE<br \/>Un permis de conduire belge au format carte bancaire est valable 10 ans. <br \/>Apr&egrave;s 10 ans, vous devez le renouveler aupr&egrave;s de votre commune, sans devoir repasser d&rsquo;examen."},{"id":"3422","qid":"16","qw":"1","q":"Quel signal de danger indique une mont&eacute;e &agrave; forte inclinaison ?<br \/><br \/>A. Signal 1.<br \/>B. Signal 2.","s":"a","e":"LE&Ccedil;ON 1 &ndash; &lsquo;La voie publique&rsquo;.<br \/>La signification du deuxi&egrave;me signal routier : descente dangereuse.<br \/>Les signaux de danger sont plac&eacute;s &agrave; une distance approximative de 150 m de l&#039;endroit dangereux . sauf mention contraire sur un panneau bleu plac&eacute; sous le signal."},{"id":"17901","qid":"36","qw":"1","q":"Vous roulez sur cette chauss&eacute;e &agrave; voie centrale. Vous souhaitez configurer votre GPS.<br \/>O&ugrave; pouvez-vous vous immobiliser ?<br \/><br \/>A. Sur la voie centrale.<br \/>B. Sur la bande lat&eacute;rale.<br \/>C. Vous n&rsquo;avez pas le droit de vous arr&ecirc;ter.","s":"c","e":"LE&Ccedil;ON 1 &ndash; &lsquo;La voie publique&rsquo;.<br \/>Vous n&rsquo;&ecirc;tes pas autoris&eacute; &agrave; stationner sur une chauss&eacute;e &agrave; voie centrale et c&rsquo;est aussi interdit sur la bande lat&eacute;rale.<br \/>Vous apprendrez dans une autre le&ccedil;on la diff&eacute;rence entre l&rsquo;arr&ecirc;t et le stationnement.<br \/>Configurer un GPS est  du stationnement."},{"id":"19461","qid":"39","qw":"1","q":"&Agrave; partir de quel &acirc;ge peut-on commencer les cours pratiques ?<br \/><br \/>A. &Agrave; 18 ans et 3 mois.<br \/>B. &Agrave; 17 ans et 3 mois.<br \/>C. &Agrave; 18 ans ou d&egrave;s 17 ans avec un guide.","s":"c","e":"INFO - PERMIS DE CONDUIRE<br \/>Avec le document de demande &lsquo;pour un permis <br \/>provisoire,  vous pouvez aller &agrave; la commune pour obtenir un permis B provisoire et donc apprendre &agrave; conduire d&egrave;s l&rsquo;&acirc;ge de 17 ans. La formation pratique peut &ecirc;tre donn&eacute;e par un guide (PP <br \/>36 mois) ou par un moniteur d&rsquo;auto-&eacute;cole.<br \/>&Agrave; 18 ans, si vous avez suivi 20 heures de cours pratiques dans une auto-&eacute;cole agr&eacute;&eacute;e et obtenu une attestation de comp&eacute;tence, vous pouvez demander &agrave; la commune un PP18 mois, afin de vous exercer seul (sans guide).  <br \/>Ce type de permis ne peut &ecirc;tre obtenu qu&rsquo;une seule fois et est valable pendant 18 mois."},{"id":"3414","qid":"8","qw":"1","q":"Que signifie ce signal routier ?<br \/><br \/>A. Prendre le ferry pour traverser.<br \/>B. D&eacute;bouch&eacute; sur un quai ou une berge.<br \/>C. Foss&eacute; profond au bord de la route.","s":"b","e":"LE&Ccedil;ON 1 &ndash; &lsquo;La voie publique&rsquo;.<br \/>C&#039;est un signal de danger.<br \/>La signification: d&eacute;bouch&eacute; sur un quai ou une berge."},{"id":"3433","qid":"27","qw":"1","q":"Que signifie ce signal de danger ?<br \/><br \/>A. Risque de d&eacute;rapage.<br \/>B. Succession de virages dangereux.<br \/>C. La chauss&eacute;e se d&eacute;vie vers la droite.","s":"b","e":"LE&Ccedil;ON 1 &ndash; &lsquo;La voie publique&rsquo;.<br \/>Signal de danger : double virage ou succession de plus de deux virages, le premier &agrave; droite.<br \/>Presque tous signaux routiers triangulaire avec un bord rouge sont des signaux de danger. <br \/>Les signaux de danger sont plac&eacute;s &agrave; une distance approximative de 150 m de l&#039;endroit dangereux."},{"id":"3410","qid":"4","qw":"1","q":"Quelle partie de la route est indiqu&eacute;e par la ligne jaune ?<br \/><br \/>A. La voie publique.<br \/>B. La chauss&eacute;e.<br \/>C. La bande de circulation.","s":"b","e":"LE&Ccedil;ON 1 &ndash; &lsquo;La voie publique&rsquo;.<br \/>La chauss&eacute;e est la partie de la voie publique am&eacute;nag&eacute;e pour la circulations des v&eacute;hicules  comme les voitures, les camions, les bus et les motocyclettes."},{"id":"3430","qid":"24","qw":"1","q":"Comment s&rsquo;appelle la partie de la voie publique, indiqu&eacute;e par la ligne jaune ?<br \/><br \/>A. La voie publique.<br \/>B. La chauss&eacute;e.<br \/>C. La bande de circulation.","s":"b","e":"LE&Ccedil;ON 1 &ndash; &lsquo;La voie publique&rsquo;.<br \/>C&rsquo;est la chauss&eacute;e."},{"id":"3408","qid":"2","qw":"1","q":"Cette combinaison d&#039;un signal routier et un panneau indique un danger potentiel lorsqu&#039;il y a de la neige ou de la glace sur la chauss&eacute;e. <br \/><br \/>A. Vrai. <br \/>B. Faux.","s":"a","e":"LE&Ccedil;ON 1 &ndash; &lsquo;La voie publique&rsquo;."},{"id":"19594","qid":"42","qw":"1","q":"Que signifie ce signal routier ?<br \/><br \/>A. Vous approchez d&rsquo;un arr&ecirc;t de tram.<br \/>B. Des rails de tram se trouvent sur la chauss&eacute;e.","s":"b","e":"LE&Ccedil;ON 1 &ndash; &lsquo;La voie publique&rsquo;<br \/>Ce panneau est un panneau de danger.<br \/>Attention au tram, qui a toujours la priorit&eacute;."},{"id":"20500","qid":"51","qw":"1","q":"Votre portefeuille avec votre permis de conduire provisoire a &eacute;t&eacute; vol&eacute; et vous avez fait une d&eacute;claration &agrave; la police.<br \/>Vous avez encore une copie couleur de votre permis.<br \/>Pouvez-vous conduire avec cette copie en attendant un nouveau permis ?","s":"non","e":"INFO : PERMIS DE CONDUIRE<br \/>Vous devez toujours avoir le permis de conduire original sur vous.<br \/>M&ecirc;me avec le document de la police prouvant que vous avez d&eacute;clar&eacute; le vol, vous ne pouvez pas conduire.<br \/>Une copie, m&ecirc;me en couleur, n&rsquo;a aucune valeur l&eacute;gale comme permis de conduire."},{"id":"3440","qid":"34","qw":"1","q":"Vous avez le permis de conduire provisoire B.<br \/>&Agrave; No&euml;l, pouvez-vous rouler en voiture pendant la journ&eacute;e ? <br \/><br \/>A. Non. <br \/>B. Oui, entre 06h00 et 22h00. <br \/>C. Oui, entre 08h00 et 18h00.","s":"b","e":"LE&Ccedil;ON 1 &ndash; &lsquo;La voie publique&rsquo;.<br \/>Vous ne pouvez pas conduire avec un permis provisoire sur la voie publique:<br \/>. Du vendredi soir 22h00 &agrave; samedi matin 6h00;<br \/>. Du samedi soir 22h00 &agrave; dimanche matin 6h00;<br \/>. Du dimanche soir 22h00 &agrave; lundi matin 6h00;<br \/>. Le soir avant un jour f&eacute;ri&eacute; 22h00 au matin de ce jour f&eacute;ri&eacute; 6h00;<br \/>. Le soir du jour f&eacute;ri&eacute; 22h00 au matin du lendemain 6h00.<br \/>Nous sommes un jour f&eacute;ri&eacute; et la conduite n&rsquo;est pas autoris&eacute;e avant 6hle lendemain matin."},{"id":"3427","qid":"21","qw":"1","q":"Commettez-vous une infraction si vous configurez l&#039;application de navigation de votre t&eacute;l&eacute;phone mobile pendant que vous conduisez ?<br \/><br \/>A. Oui.<br \/>B. Non,","s":"a","e":"LE&Ccedil;ON 1 &ndash; &lsquo;La voie publique&rsquo;.<br \/>Ce n&rsquo;est pas une bonne id&eacute;e car lors de la configuration d&#039;une application, votre attention se porte sur quelque chose de compl&egrave;tement diff&eacute;rent de la circulation sur la chauss&eacute;e.<br \/>Le code ne sp&eacute;cifie toutefois pas que la configuration est interdite.<br \/>8.4. Sauf lorsque son v&eacute;hicule est &agrave; l&rsquo;arr&ecirc;t ou en stationnement, le conducteur ne peut utiliser, tenir en main ni manipuler aucun appareil &eacute;lectronique mobile dot&eacute; d&rsquo;un &eacute;cran, &agrave; moins qu&rsquo;il ne soit fix&eacute; au v&eacute;hicule dans un support destin&eacute; &agrave; cette fin."},{"id":"3438","qid":"32","qw":"1","q":"Vous avez le permis de conduire provisoire B.<br \/>Nous sommes le 2 janvier.<br \/>&Agrave; partir de quelle heure, pouvez-vous conduire une voiture ?<br \/><br \/>A. Toute la journ&eacute;e.<br \/>B. &Agrave; partir de 06h00.<br \/>C. &Agrave; partir de 08h00.","s":"b","e":"INFO - PERMIS DE CONDUIRE<br \/>Vous ne pouvez pas conduire avec un permis provisoire sur la voie publique:<br \/>. Du vendredi soir 22h00 &agrave; samedi matin 6h00;<br \/>. Du samedi soir 22h00 &agrave; dimanche matin 6h00;<br \/>. Du dimanche soir 22h00 &agrave; lundi matin 6h00;<br \/>. Le soir avant un jour f&eacute;ri&eacute; 22h00 au matin de ce jour f&eacute;ri&eacute; 6h00;<br \/>. Le soir du jour f&eacute;ri&eacute; 22h00 au matin du lendemain 6h00.<br \/>Nous sommes le lendemain d&rsquo;un jour f&eacute;ri&eacute; et la conduite n&rsquo;est pas autoris&eacute;e avant 6h, toutefois si le 2 janvier est un lundi, mardi, mercredi ou jeudi, on pourra conduire apr&egrave;s 22h."},{"id":"3441","qid":"35","qw":"1","q":"Cette combinaison d&#039;un signal routier et un panneau signifie que sur une distance de 7,5 km, la voie publique peut &ecirc;tre rendue glissante en raison du verglas ou de la neige. <br \/><br \/>A. Vrai.<br \/>B. Faux.","s":"a","e":"LE&Ccedil;ON 1 &ndash; &lsquo;La voie publique&rsquo;.<br \/>Chauss&eacute;e glissante. Le panneau additionnel du mod&egrave;le suivant peut &ecirc;tre employ&eacute; pour indiquer que la voie publique peut &ecirc;tre rendue glissante en raison du verglas ou de la neige.<br \/>Presque tous signaux routiers triangulaire avec un bord rouge sont des signaux de danger. <br \/>Les signaux de danger sont plac&eacute;s &agrave; une distance approximative de 150 m de l&#039;endroit dangereux et le panneau additionnel s&rsquo;applique au signal au-dessus duquel il se trouve."},{"id":"3412","qid":"6","qw":"1","q":"Lequel de ces deux signaux routiers annonce un dispositif sur&eacute;lev&eacute; &agrave; 150m ?<br \/><br \/>A. Signal A.<br \/>B. Signal B.","s":"b","e":"LE&Ccedil;ON 1 &ndash; &lsquo;La voie publique&rsquo;.<br \/>Les deux signaux routiers sont des signaux de danger.<br \/>La signification du signal de A est cassis ou dos d&#039;&acirc;ne."},{"id":"3431","qid":"25","qw":"1","q":"Sur une route ordinaire o&ugrave; la vitesse est limit&eacute;e &agrave; 90 km\/h, vous roulez &agrave; 120 km\/h.<br \/>Quelles sont les cons&eacute;quences ? <br \/><br \/>A. Vous recevrez une amende.<br \/>B. Votre permis sera temporairement retir&eacute;.<br \/>C. Vous devrez repasser votre examen th&eacute;orique et pratique.","s":"a","e":"LE&Ccedil;ON 1 &ndash; &lsquo;La voie publique&rsquo;.<br \/>Un exc&egrave;s de plus de 40 km\/h que la vitesse maximale permise sur des routes ordinaires, hors agglom&eacute;ration est puni par le juge qui prononce lad&eacute;ch&eacute;ance du droit de conduire pour une dur&eacute;e d&#039;au moins huit jours et au maximum cinq ans.<br \/>Pour l&rsquo;examen : bien lire l&rsquo;explication dans la le&ccedil;on 12.<br \/>Ici nous sommes hors agglom&eacute;ration et donc ce sera juste une amende car la vitesse autoris&eacute;e est d&eacute;pass&eacute;e de 30 kms\/h. M&ecirc;me un jeune conducteur pour qui les r&egrave;gles sont plus strictes n&rsquo;aurait pas de d&eacute;ch&eacute;ance car c&rsquo;est 30 kms\/h au-dessus de la limite et lui serait d&eacute;chu &agrave; plus de 30 kms, donc &agrave; 121 kms\/h."},{"id":"20411","qid":"45","qw":"1","q":"Ce conducteur se sent en s&eacute;curit&eacute; en roulant au milieu de la chauss&eacute;e.<br \/>Mais est-ce qu&rsquo;il en a le droit ?<br \/><br \/>A. Oui.<br \/>B. Non.","s":"b","e":"LE&Ccedil;ON 1<br \/>Les conducteurs roulent &agrave; droite de la chauss&eacute;e si c&rsquo;est possible.<br \/>Rouler sans raison au milieu ou &agrave; gauche de la chauss&eacute;e constitue une infraction."},{"id":"20497","qid":"48","qw":"1","q":"&Agrave; partir de quel &acirc;ge peut-on apprendre &agrave; conduire une voiture en Belgique ?<br \/><br \/>A. 17 ans.<br \/>B. 17 ans et 9 mois.<br \/>C. 18 ans.","s":"a","e":"INFO : PERMIS DE CONDUIRE<br \/>D&egrave;s l&rsquo;&acirc;ge de 17 ans, et apr&egrave;s avoir r&eacute;ussi l&rsquo;examen th&eacute;orique, vous pouvez apprendre &agrave; conduire une voiture avec une auto-&eacute;cole ou avec un guide.<br \/>L&rsquo;examen pratique peut &ecirc;tre pr&eacute;sent&eacute; &agrave; partir de 18 ans, apr&egrave;s avoir effectu&eacute; le nombre d&rsquo;heures de stage requis."},{"id":"20504","qid":"52","qw":"1","q":"&Agrave; quelle vitesse maximale cette voiture rouge peut-elle circuler sur une route ordinaire dans la r&eacute;gion de Bruxelles-Capitale ?<br \/><br \/>A. 50 km\/h.<br \/>B. 70 km\/h. <br \/>C. 90 km\/h.","s":"b","e":"LE&Ccedil;ON 1<br \/>En Flandre et dans la r&eacute;gion de Bruxelles-Capitale, la vitesse maximale autoris&eacute;e sur une route ordinaire est de 70 km\/h.<br \/>En Wallonie, elle est de 90 km\/h."},{"id":"3409","qid":"3","qw":"1","q":"Que signifie ce signal routier ?<br \/><br \/>A. Descente dangereuse.<br \/>B. Mont&eacute;e &agrave; forte inclinaison.","s":"a","e":"LE&Ccedil;ON 1 &ndash; &lsquo;La voie publique&rsquo;.<br \/>Le signal avec un % vers le bas: descente dangereuse.<br \/>C&#039;est un signal de danger.<br \/>Pour info, le pourcentage indique qu&rsquo;on descend de 10m de haut sur une distance de 100m (on ne vous interroge pas sur cet aspect)"},{"id":"3415","qid":"9","qw":"1","q":"Comment s&rsquo;appelle la partie de la voie publique indiqu&eacute;e par la ligne jaune ?<br \/><br \/>A. La voie publique.<br \/>B. La bande de circulation.<br \/>C. La chauss&eacute;e.","s":"c","e":"LE&Ccedil;ON 1 &ndash; &lsquo;La voie publique&rsquo;.<br \/>Le code de la route s&rsquo;applique sur la voie publique."},{"id":"3435","qid":"29","qw":"1","q":"Les bandes d&rsquo;herbe que vous voyez sur cette image font-elles partie de la voie publique ?<br \/><br \/>A. Oui.<br \/>B. Non.","s":"a","e":"LE&Ccedil;ON 1 &ndash; &lsquo;La voie publique&rsquo;.<br \/>La piste cyclable, l&#039;accotement de plein pied ou en saillie, la bande de stationnement, les trottoirs et les bandes d&rsquo;herbe font partie de la voie publique. <br \/>La voie publique s&rsquo;&eacute;tend jusqu&#039;au foss&eacute;, talus ou la limite d&#039;une propri&eacute;t&eacute; priv&eacute;e."},{"id":"20146","qid":"44","qw":"1","q":"Comment r&eacute;agissez-vous si, en voiture, vous approchez d&rsquo;un cheval avec cavalier et que le cheval se cabre de peur ?<br \/><br \/>A. Vous continuez &agrave; rouler.<br \/>B. Vous ralentissez.<br \/>C. Vous vous arr&ecirc;tez.","s":"c","e":"LE&Ccedil;ON 1<br \/>Si un cheval sur la chauss&eacute;e prend peur d&rsquo;une voiture et se cabre, le conducteur doit arr&ecirc;ter son v&eacute;hicule et surtout &eacute;viter tout mouvement brusque, afin que le cavalier puisse calmer le cheval et reprendre le contr&ocirc;le de la situation avant qu&rsquo;elle ne d&eacute;g&eacute;n&egrave;re."},{"id":"3407","qid":"1","qw":"1","q":"Le code de la route s&rsquo;applique-t-il aussi aux v&eacute;hicules sur rails qui empruntent la voie publique ?","s":"non","e":"LE&Ccedil;ON 1 &ndash; &lsquo;La voie publique&rsquo;<br \/>Les conducteurs de tram ne doivent pas tenir compte du code de la route, sauf les ordres d&#039;une personne autoris&eacute;e et toutefois ils doivent respecter les injonctions des agents qualifi&eacute;s et les feux lumineux de circulation."},{"id":"3428","qid":"22","qw":"1","q":"Les conducteurs de tram ne doivent pas suivre les r&egrave;gles de la circulation.<br \/>Ils doivent toutefois tenir compte des injonctions des agents qualifi&eacute;s et des feux lumineux de circulation<br \/><br \/>A. Vrai. <br \/>B. Faux.","s":"a","e":"LE&Ccedil;ON 1 &ndash; &lsquo;La voie publique&rsquo;.<br \/>Les conducteurs de tram ne doivent pas non plus tenir compte du code de la route, sauf les injonctions des agents qualifi&eacute;s et les feux lumineux de circulation.<br \/>Dans une le&ccedil;on suivante, nous apprendrons qu&rsquo;un tram a toujours la priorit&eacute;."},{"id":"19486","qid":"40","qw":"1","q":"Que signifie ce signal de danger ?<br \/><br \/>A. Orni&egrave;res.<br \/>B. Aquaplanage.","s":"a","e":"Les orni&egrave;res, ces traces que les roues des v&eacute;hicules creusent sur la route, peuvent nuire &agrave; la s&eacute;curit&eacute; des automobilistes."},{"id":"19943","qid":"43","qw":"1","q":"Une personne sujette &agrave; des crises d&rsquo;&eacute;pilepsie peut-elle conduire une voiture ?<br \/><br \/>A. Oui.<br \/>B. Jamais, car elle peut toujours avoir une crise.<br \/>C. Seulement apr&egrave;s une p&eacute;riode sans crise, un m&eacute;decin peut autoriser la conduite.","s":"c","e":"INFO - PERMIS DE CONDUIRE<br \/>En principe, une personne qui fait des crises d&rsquo;&eacute;pilepsie n&rsquo;a pas le droit de conduire.<br \/>Apr&egrave;s une premi&egrave;re crise, il y a une interdiction de conduire pendant 6 mois.<br \/>Une personne souffrant d&rsquo;&eacute;pilepsie chronique qui, apr&egrave;s traitement, reste 1 an sans crise peut, sur avis d&rsquo;un m&eacute;decin sp&eacute;cialis&eacute;, r&eacute;cup&eacute;rer le droit de conduire.<br \/>En cas de nouvelle crise, une interdiction d&rsquo;1 an s&rsquo;applique &agrave; nouveau."},{"id":"3437","qid":"31","qw":"1","q":"Vous avez le permis de conduire provisoire B.<br \/>&Agrave; partir de quelle heure le vendredi soir ne pouvez-vous plus conduire une voiture ?<br \/><br \/>A. &Agrave; partir de 18h00.<br \/>B. &Agrave; partir de 20h00.<br \/>C. &Agrave; partir de 22h00.","s":"c","e":"INFO - PERMIS DE CONDUIRE<br \/>Vous ne pouvez pas conduire avec un permis provisoire sur la voie publique:<br \/>. Du vendredi soir 22h00 &agrave; samedi matin 6h00;<br \/>. Du samedi soir 22h00 &agrave; dimanche matin 6h00;<br \/>. Du dimanche soir 22h00 &agrave; lundi matin 6h00;<br \/>. Le soir avant un jour f&eacute;ri&eacute; 22h00 au matin de ce jour f&eacute;ri&eacute; 6h00;<br \/>. Le soir du jour f&eacute;ri&eacute; 22h00 au matin du lendemain 6h00."},{"id":"3416","qid":"10","qw":"1","q":"De quel type de signal routier s&rsquo;agit-il ?<br \/><br \/>A. Signal de danger.<br \/>B. Signal d&rsquo;obligation.<br \/>C. Signal d&rsquo;interdiction.","s":"a","e":"LE&Ccedil;ON 1 &ndash; &lsquo;La voie publique&rsquo;.<br \/>Presque tous signaux routiers triangulaire avec une bordure rouge sont des signaux de danger. <br \/>Les signaux de danger sont plac&eacute;s &agrave; une distance approximative de 150 m de l&#039;endroit dangereux sauf mention contraire sur un panneau bleu plac&eacute; sous le signal.<br \/>La signification: r&eacute;tr&eacute;cissement de la chauss&eacute;e."},{"id":"3418","qid":"12","qw":"1","q":"Que signifie ce signal de danger? <br \/><br \/>A. Succession de virages dangereux.<br \/>B. Aquaplaning. <br \/>C. Chauss&eacute;e glissante.","s":"c","e":"LE&Ccedil;ON 1 &ndash; &lsquo;La voie publique&rsquo;.<br \/>La signification: chauss&eacute;e glissante.<br \/>Les signaux de danger sont plac&eacute;s &agrave; une distance approximative de 150 m de l&#039;endroit dangereux, sauf mention contraire sur un panneau bleu plac&eacute; sous le signal."},{"id":"3413","qid":"7","qw":"1","q":"Lorsqu&rsquo;un chemin de terre est rev&ecirc;tu de b&eacute;ton ou d&rsquo;asphalte sur les derniers m&egrave;tres avant de rejoindre une autre voie publique, il n&rsquo;est plus consid&eacute;r&eacute; comme un chemin de terre mais comme une chauss&eacute;e.<br \/><br \/>A. Vrai.<br \/>B. Faux.","s":"b","e":"LE&Ccedil;ON 1 &ndash; &lsquo;La voie publique&rsquo;.<br \/>Lorsqu&rsquo;un chemin de terre est pav&eacute; de b&eacute;ton ou d&rsquo;asphalte sur les derniers m&egrave;tres avant de rejoindre une autre voie publique, il n&rsquo;est pas consid&eacute;r&eacute; comme une chauss&eacute;e."},{"id":"3432","qid":"26","qw":"1","q":"Cette combinaison de signaux routiers signifie que la chauss&eacute;e...<br \/><br \/>A. Peut &ecirc;tre glissante. <br \/>B. Peut &ecirc;tre glissante &agrave; cause de la neige ou de la glace sur la chauss&eacute;e. <br \/>C. Peut &ecirc;tre glissante &agrave; cause de la neige ou de la glace sur la chauss&eacute;e ou des d&eacute;versements d&#039;huile.","s":"b","e":"LE&Ccedil;ON 1 &ndash; &lsquo;La voie publique&rsquo;."},{"id":"19491","qid":"41","qw":"1","q":"Votre portefeuille contenant votre permis de conduire est introuvable. Vous soup&ccedil;onnez un vol. Que faites-vous ?<br \/><br \/>A. Vous devez avertir la police.<br \/>B. Vous devez avertir la maison communale.<br \/>C. Vous devez avertir le centre d&rsquo;examen.","s":"a","e":"INFO : PERMIS DE CONDUIRE<br \/>Si votre permis de conduire est vol&eacute;, vous devez faire une d&eacute;claration &agrave; la police.<br \/>Si vous l&rsquo;avez perdu, vous devez en faire la d&eacute;claration &agrave; la police, soit num&eacute;riquement, soit aupr&egrave;s de la commune.<br \/>Attention : sans v&eacute;ritable permis, vous ne pouvez PAS conduire."},{"id":"20495","qid":"46","qw":"1","q":"Tu as suivi 20 heures de cours pratiques dans une auto-&eacute;cole agr&eacute;&eacute;e et tu as re&ccedil;u une &laquo; attestation de comp&eacute;tence &raquo;.<br \/>&Agrave; partir de quel &acirc;ge peux-tu d&eacute;sormais conduire seul pour t&rsquo;exercer ?<br \/><br \/>A. &Agrave; partir de 17 ans.<br \/>B. &Agrave; partir de 17 ans et 9 mois.<br \/>C. &Agrave; partir de 18 ans.","s":"c","e":"INFO - PERMIS DE CONDUIRE<br \/>Tu dois avoir suivi 20 heures de cours pratiques et avoir 18 ans pour pouvoir conduire seul avec un permis provisoire 18M."},{"id":"3423","qid":"17","qw":"1","q":"Que signifie ce signal de danger ?<br \/><br \/>A. Projections de gravillons.<br \/>B. &Eacute;claboussures d&rsquo;eau.<br \/>C. Aquaplanage.","s":"a","e":"LE&Ccedil;ON 1 &ndash; &lsquo;La voie publique&rsquo;.<br \/>Presque tous es signaux routiers rectangulaires avec une bordure rouge sont des signaux de danger. <br \/>Les signaux de danger sont plac&eacute;s &agrave; une distance approximative de 150 m de l&#039;endroit dangereux, sauf mention contraire sur un panneau bleu plac&eacute; sous le signal."},{"id":"3436","qid":"30","qw":"1","q":"Vous avez le permis de conduire provisoire B.<br \/>C&rsquo;est le jour de l&rsquo;an et vous avez dormi jusque midi.<br \/>Pouvez-vous ensuite vous rendre en voiture chez vos grands parents seul si vous avez le M18 ou avec votre guide si vous avez le M36 ?","s":"oui","e":"INFO - PERMIS DE CONDUIRE<br \/>Vous ne pouvez pas conduire avec un permis provisoire sur la voie publique:<br \/>. Du vendredi soir 22h00 &agrave; samedi matin 6h00;<br \/>. Du samedi soir 22h00 &agrave; dimanche matin 6h00;<br \/>. Du dimanche soir 22h00 &agrave; lundi matin 6h00;<br \/>. Le soir avant un jour f&eacute;ri&eacute; 22h00 au matin de ce jour f&eacute;ri&eacute; 6h00;<br \/>. Le soir du jour f&eacute;ri&eacute; 22h00 au matin du lendemain 6h00.<br \/>Nous sommes un jour f&eacute;ri&eacute; et donc la conduite est autoris&eacute;e entre 6h00 et 22h00 mais il faut &ecirc;tre accompagn&eacute; de notre guide en M36, alors que rouler seul(e) est autoris&eacute; en M18. <br \/>Le M12 (permis avec guide) requiert aussi la pr&eacute;sence du guide. Ce permis est obtenu apr&egrave;s 6h d&rsquo;auto-&eacute;cole apr&egrave;s expiration (depuis moins de 3 ans) du M18 ou du M36."},{"id":"21350","qid":"54","qw":"1","q":"Ce signal routier de danger signifie &#039;danger&#039;.<br \/>Mais o&ugrave; se situe le danger ?<br \/><br \/>A. &Agrave; partir d&rsquo;ici et sur 100 m&egrave;tres.<br \/>B. &Agrave; 100 m&egrave;tres.<br \/>C. &Agrave; 150 m&egrave;tres.","s":"c","e":"LE&Ccedil;ON 1<br \/>Les signaux routiers de danger ont une forme triangulaire avec un bord rouge.<br \/>Ils sont plac&eacute;s en principe &agrave; environ 150 m&egrave;tres avant le danger.<br \/>(En agglom&eacute;ration, cette distance peut &ecirc;tre plus courte.)"}];timer=28000;show=1;$('#btn_start_with_voice').on('click',function(e){$('#q-start').hide();$('#q-content').show();set_question();voice=1;ae.play();e.preventDefault();});$('#btn_start_without_voice').on('click',function(e){$('#q-start').hide();$('#q-content').show();set_question();e.preventDefault();})});
