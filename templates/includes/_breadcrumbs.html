{% load i18n %}
<nav aria-label="breadcrumb" class="bg-gray-50 border-b border-gray-100">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-2.5">
    <div class="flex items-center gap-1.5 text-sm text-gray-500 flex-wrap">

      <a href="{% url 'main:home' %}" class="hover:text-blue-600 transition">{% trans "Accueil" %}</a>

      {% if crumb2 %}
      <svg class="w-3 h-3 text-gray-300 shrink-0" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="m8.25 4.5 7.5 7.5-7.5 7.5"/></svg>
      {% if crumb2_url %}<a href="{{ crumb2_url }}" class="hover:text-blue-600 transition">{{ crumb2 }}</a>{% else %}<span class="text-gray-700">{{ crumb2 }}</span>{% endif %}
      {% endif %}

      {% if crumb3 %}
      <svg class="w-3 h-3 text-gray-300 shrink-0" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="m8.25 4.5 7.5 7.5-7.5 7.5"/></svg>
      {% if crumb3_url %}<a href="{{ crumb3_url }}" class="hover:text-blue-600 transition">{{ crumb3 }}</a>{% else %}<span class="text-gray-700">{{ crumb3 }}</span>{% endif %}
      {% endif %}

      {% if crumb4 %}
      <svg class="w-3 h-3 text-gray-300 shrink-0" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="m8.25 4.5 7.5 7.5-7.5 7.5"/></svg>
      <span class="text-gray-700 font-medium truncate max-w-xs sm:max-w-sm" aria-current="page">{{ crumb4 }}</span>
      {% endif %}

    </div>
  </div>
</nav>
